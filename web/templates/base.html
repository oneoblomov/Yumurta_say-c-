<!doctype html>
<html lang="{{ lang }}" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ t.get('app_title', 'Yumurta Sayıcı') }} - Azim Tav</title>
    <!-- Apply theme immediately to prevent flash -->
    <script>
      (function(){
        var t=localStorage.getItem('app-theme')||'system';
        var d=document.documentElement;
        if(t==='dark'){d.classList.add('dark');}
        else if(t==='system'&&window.matchMedia('(prefers-color-scheme:dark)').matches){d.classList.add('dark');}
      })();
    </script>
    <!-- TailwindCSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class", content: ["./templates/**/*.html", "./static/js/**/*.js"],
        theme: {
          extend: {
            colors: {
              primary: {
                50: "#eff6ff",
                100: "#dbeafe",
                200: "#bfdbfe",
                300: "#93c5fd",
                400: "#60a5fa",
                500: "#3b82f6",
                600: "#2563eb",
                700: "#1d4ed8",
                800: "#1e40af",
                900: "#1e3a8a",
              },
              egg: { light: "#fef3c7", DEFAULT: "#f59e0b", dark: "#b45309" },
            },
          },
        },
      };
    </script>
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ request.url_for('static', path='css/app.css') }}" />
  </head>
  <body class="h-full bg-gray-50 text-gray-800" x-data="app()" x-init="init()">

    <!-- Mobile Header -->
    <header class="lg:hidden fixed top-0 inset-x-0 z-50 bg-white border-b border-gray-200 shadow-sm">
      <div class="flex items-center justify-between px-4 h-14">
        <button @click="sidebarOpen=!sidebarOpen" class="p-2 rounded-lg hover:bg-gray-100">
          <i data-lucide="menu" class="w-5 h-5"></i>
        </button>
        <div class="flex items-center gap-2">
          <span class="text-lg font-bold text-primary-600">🥚</span>
          <span class="font-semibold text-sm" x-text="t.app_title || 'Yumurta Sayıcı'"></span>
        </div>
        <button @click="showAlerts = !showAlerts"
                class="relative p-2 rounded-lg hover:bg-gray-100">
          <i data-lucide="bell" class="w-5 h-5"></i>
          <span x-show="alertCount>0"
                class="absolute -top-0.5 -right-0.5 bg-red-500 text-white text-xs rounded-full w-4 h-4 flex items-center justify-center"
                x-text="alertCount"></span>
        </button>
      </div>
    </header>

    <!-- Sidebar Overlay (mobile) -->
    <div x-show="sidebarOpen" @click="sidebarOpen=false"
         class="fixed inset-0 bg-black/40 z-40 lg:hidden"
         x-transition:enter="transition-opacity duration-200"
         x-transition:leave="transition-opacity duration-200"></div>

    <aside :class="sidebarCollapsed ? 'lg:w-16' : 'lg:w-64'"
           :style="sidebarOpen ? 'transform: translateX(0)' : ''"
           class="fixed top-0 left-0 z-50 w-64 h-full bg-slate-800 text-white transition-all duration-200 lg:z-30 flex flex-col -translate-x-full lg:translate-x-0">

      <!-- Brand -->
      <div class="flex items-center gap-3 px-4 h-16 border-b border-slate-700 overflow-hidden">
        <div :class="sidebarCollapsed ? 'lg:hidden' : ''" class="min-w-0">
          <h1 class="font-bold text-sm leading-tight truncate" x-text="t.app_title || 'Yumurta Sayıcı'"></h1>
          <p class="text-[10px] text-slate-400">Azim Tav v1.0</p>
        </div>
        <!-- Desktop collapse toggle -> include egg icon when collapsed -->
        <button @click="toggleSidebarCollapsed(); $nextTick(() => lucide.createIcons());"
                class="flex ml-auto shrink-0 items-center gap-2 p-1.5 rounded-lg hover:bg-slate-700 transition-colors"
                :title="sidebarCollapsed ? (t.common?.expand||'Genişlet') : (t.common?.collapse||'Küçült')">
          <i :data-lucide="sidebarCollapsed ? 'panel-left-open' : 'panel-left-close'" class="w-4 h-4 text-slate-400"></i>
        </button>
      </div>

      <!-- Nav -->
      <nav class="flex-1 py-4 px-2 space-y-1 overflow-y-auto overflow-x-hidden">
        <template x-for="item in [
          {page:'dashboard', icon:'layout-dashboard', key:'dashboard'},
          {page:'records', icon:'database', key:'records'},
          {page:'logs', icon:'scroll-text', key:'logs'},
          {page:'settings', icon:'settings', key:'settings'}
        ]" :key="item.page">
          <a :href="'/'+item.page"
             :hx-get="'/'+item.page"
             hx-target="#main-content"
             hx-push-url="true"
             @click="sidebarOpen=false; currentPage=item.page"
             :class="currentPage===item.page ? 'bg-primary-600 text-white' : 'text-slate-300 hover:bg-slate-700'"
             class="sidebar-nav-item relative flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors">
            <i :data-lucide="item.icon" class="w-4 h-4 shrink-0"></i>
            <span :class="sidebarCollapsed ? 'lg:hidden' : ''" class="truncate" x-text="t.nav?.[item.key] || item.key"></span>
            <!-- Tooltip for collapsed state -->
            <span class="sidebar-tooltip" x-text="t.nav?.[item.key] || item.key"></span>
          </a>
        </template>
      </nav>

        <!-- System Metrics -->
        <div x-show="!sidebarCollapsed" x-transition class="px-3 pb-3 overflow-hidden" x-cloak>
          <div class="rounded-2xl border border-slate-700 bg-slate-900/70 p-3 space-y-3">
            <div class="flex items-center justify-between gap-2">
              <span class="text-xs font-semibold uppercase tracking-wide text-slate-200" x-text="t.metrics?.title || 'Sistem'"></span>
              <span class="text-[10px] text-slate-400" x-text="systemMetrics.updated_at ? systemMetrics.updated_at : '-'"></span>
            </div>

            <div>
              <div class="flex items-center justify-between text-[11px] text-slate-400 mb-1">
                <span x-text="t.metrics?.temperature || 'Sıcaklık'"></span>
                <span x-text="formatTemperature(systemMetrics.cpu_temperature_c)"></span>
              </div>
            </div>

            <div class="space-y-2">
              <template x-for="metric in [
                { key: 'cpu_usage', label: t.metrics?.cpu || 'CPU' },
                { key: 'memory_usage', label: t.metrics?.memory || 'RAM' },
                { key: 'disk_usage', label: t.metrics?.disk || 'Disk' }
              ]" :key="metric.key">
                <div>
                  <div class="flex items-center justify-between text-[11px] text-slate-400 mb-1">
                    <span x-text="metric.label"></span>
                    <span x-text="formatPercent(systemMetrics[metric.key])"></span>
                  </div>
                  <div class="h-1.5 rounded-full bg-slate-700 overflow-hidden">
                    <div class="h-full rounded-full transition-all duration-500"
                         :style="`width: ${Math.max(0, Math.min(100, Number(systemMetrics[metric.key]) || 0))}%; background-color: ${metricColor(systemMetrics[metric.key])};`"></div>
                  </div>
                </div>
              </template>
            </div>
          </div>
        </div>

      <!-- Sidebar Footer -->
      <div class="px-3 py-3 border-t border-slate-700 overflow-hidden space-y-2">
        <button @click="toggleLocalMonitor()"
            :disabled="status.local_monitor_available === false"
            :title="status.local_monitor_enabled ? 'Yerel monitörü kapat' : 'Yerel monitörü aç'"
          :class="status.local_monitor_enabled ? 'bg-emerald-500 hover:bg-emerald-600 text-white' : 'bg-slate-700 hover:bg-slate-600 text-slate-100'"
            class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
          <i data-lucide="monitor" class="w-4 h-4 shrink-0"></i>
          <span :class="sidebarCollapsed ? 'lg:hidden' : ''" class="text-sm font-medium truncate"
            x-text="status.local_monitor_enabled ? 'Yerel ekran kapat' : 'Yerel ekran aç'"></span>
        </button>
        <p :class="sidebarCollapsed ? 'lg:hidden' : ''" class="text-[10px] leading-snug text-amber-300"
           x-show="status.local_monitor_available === false"
           x-text="status.local_monitor_error || 'Grafik oturumu gerekli'">
        </p>
      </div>
    </aside>

    <!-- Main Content Area -->
    <div id="main-wrapper" class="min-h-screen pt-14 lg:pt-0 ml-0"
         :class="sidebarCollapsed ? 'lg:ml-16' : 'lg:ml-64'">

      <!-- Desktop Top Bar -->
      <header class="hidden lg:flex items-center justify-between px-6 h-14 bg-white border-b border-gray-200 shadow-sm">
        <div class="flex items-center gap-4">
          <h2 class="text-lg font-semibold text-gray-700" id="page-title"
              x-text="t.nav?.[currentPage] || currentPage"></h2>
          <!-- Pipeline mini status -->
          <div class="flex items-center gap-2 text-xs text-gray-500" x-show="status.running">
            <span class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span>
            <span>FPS: <strong x-text="status.fps"></strong></span>
            <span>|</span>
            <span x-text="(t.common?.active_tracks||'Aktif')+': '+status.active_tracks"></span>
          </div>
        </div>
        <div class="flex items-center gap-3">
          <!-- Theme toggle buttons -->
          <div class="flex items-center gap-1 bg-gray-100 rounded-lg p-1">
            <button @click="setTheme('light')"
                    :class="theme==='light' ? 'bg-white shadow-sm text-gray-800' : 'text-gray-500 hover:text-gray-700'"
                    class="px-2 py-1 rounded-md transition-all text-xs flex items-center gap-1"
                    :title="t.settings?.theme_light||'Açık'">
              <i data-lucide="sun" class="w-3.5 h-3.5"></i>
            </button>
            <button @click="setTheme('dark')"
                    :class="theme==='dark' ? 'bg-white shadow-sm text-gray-800' : 'text-gray-500 hover:text-gray-700'"
                    class="px-2 py-1 rounded-md transition-all text-xs flex items-center gap-1"
                    :title="t.settings?.theme_dark||'Koyu'">
              <i data-lucide="moon" class="w-3.5 h-3.5"></i>
            </button>
            <button @click="setTheme('system')"
                    :class="theme==='system' ? 'bg-white shadow-sm text-gray-800' : 'text-gray-500 hover:text-gray-700'"
                    class="px-2 py-1 rounded-md transition-all text-xs flex items-center gap-1"
                    :title="t.settings?.theme_system||'Sistem'">
              <i data-lucide="monitor" class="w-3.5 h-3.5"></i>
            </button>
          </div>
          <!-- Alert Bell -->
          <button @click="showAlerts=!showAlerts"
                  class="relative p-2 rounded-lg hover:bg-gray-100 transition-colors">
            <i data-lucide="bell" class="w-5 h-5 text-gray-500"></i>
            <span x-show="alertCount>0"
                  class="absolute -top-0.5 -right-0.5 bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center"
                  x-text="alertCount"></span>
          </button>
        </div>
      </header>

      <!-- Alert Dropdown -->
      <div x-show="showAlerts" @click.outside="showAlerts=false" x-ref="alertPanel"
           class="fixed right-4 top-16 w-80 max-h-96 bg-white rounded-xl shadow-2xl border border-gray-200 z-50 overflow-hidden"
           x-transition>
        <div class="flex items-center justify-between px-4 py-3 bg-gray-50 border-b">
          <span class="font-semibold text-sm" x-text="t.alerts?.title || 'Bildirimler'"></span>
          <button @click="ackAllAlerts()" class="text-xs text-primary-600 hover:underline"
                  x-text="t.alerts?.ack_all || 'Tümü okundu'"></button>
        </div>
        <div class="overflow-y-auto max-h-72 divide-y divide-gray-100">
          <template x-for="a in alerts" :key="a.id">
            <div class="px-4 py-3 hover:bg-gray-50 flex items-start gap-3">
              <span :class="{
                      'text-blue-500': a.severity==='info',
                      'text-yellow-500': a.severity==='warning',
                      'text-red-500': a.severity==='error' || a.severity==='critical'
                    }">
                <i :data-lucide="a.severity==='info'?'info':'alert-triangle'" class="w-4 h-4"></i>
              </span>
              <div class="flex-1 min-w-0">
                <p class="text-sm text-gray-700 truncate" x-text="a.message"></p>
                <p class="text-xs text-gray-400 mt-0.5" x-text="a.created_at"></p>
              </div>
              <button x-show="!a.acknowledged" @click="ackAlert(a.id)"
                      class="shrink-0 text-xs text-primary-500 hover:underline">✓</button>
            </div>
          </template>
          <div x-show="alerts.length===0" class="px-4 py-8 text-center text-gray-400 text-sm">
            <span x-text="t.alerts?.empty || 'Bildirim yok'"></span>
          </div>
        </div>
      </div>

      <!-- Toast Notification -->
      <div x-show="toast.show" x-transition
           class="fixed bottom-6 right-6 z-50 px-4 py-3 rounded-xl shadow-lg text-white text-sm font-medium"
           :class="{
             'bg-green-500': toast.type==='success',
             'bg-red-500': toast.type==='error',
             'bg-yellow-500': toast.type==='warning',
             'bg-blue-500': toast.type==='info'
           }">
        <div class="flex items-center gap-2">
          <span x-text="toast.message"></span>
          <button @click="toast.show=false" class="ml-2 opacity-70 hover:opacity-100">✕</button>
        </div>
      </div>

      <!-- Page Content -->
      <main id="main-content" class="p-4 lg:p-6">
        {% if page_content is defined %} {% include page_content %} {% endif %}
      </main>
    </div>

    <!-- App Init Data -->
    <script>
      window.__appInit = {
          lang: "{{ lang }}",
          langs: {{ langs|tojson|safe }},
          t: {{ t|tojson|safe }}
      };
    </script>
    <!-- App JS -->
    <script src="{{ request.url_for('static', path='js/app.js') }}"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => lucide.createIcons());
      document.body.addEventListener("htmx:afterSwap", () => {
        lucide.createIcons();
        if (typeof initPageCharts === "function") initPageCharts();
      });
    </script>
  </body>
</html>
