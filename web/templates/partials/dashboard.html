<!-- partials/dashboard.html - Gösterge Paneli -->
<div x-data="dashboard()" x-init="init()">
  <!-- Control Bar -->
  <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-4 mb-4">
    <div class="flex flex-wrap items-center gap-3">
      <!-- Start -->
      <button
        @click="startPipeline()"
        :disabled="status.running && !status.paused"
        :class="status.running && !status.paused ? 'bg-gray-300 cursor-not-allowed' : 'bg-green-500 hover:bg-green-600 shadow-green-200 shadow-md'"
        class="flex items-center gap-2 px-5 py-2.5 text-white rounded-lg font-medium text-sm transition-all"
      >
        <i data-lucide="play" class="w-4 h-4"></i>
        <span x-text="t.controls?.start || 'Başlat'"></span>
      </button>

      <!-- Pause/Resume -->
      <button
        @click="status.paused ? resumePipeline() : pausePipeline()"
        x-show="status.running"
        :class="status.paused ? 'bg-blue-500 hover:bg-blue-600' : 'bg-yellow-500 hover:bg-yellow-600'"
        class="flex items-center gap-2 px-4 py-2.5 text-white rounded-lg font-medium text-sm transition-all"
      >
        <i :data-lucide="status.paused ? 'play' : 'pause'" class="w-4 h-4"></i>
        <span
          x-text="status.paused ? (t.controls?.resume||'Devam') : (t.controls?.pause||'Duraklat')"
        ></span>
      </button>

      <!-- Stop -->
      <button
        @click="stopPipeline()"
        x-show="status.running"
        class="flex items-center gap-2 px-4 py-2.5 bg-red-500 hover:bg-red-600 text-white rounded-lg font-medium text-sm transition-all"
      >
        <i data-lucide="square" class="w-4 h-4"></i>
        <span x-text="t.controls?.stop || 'Durdur'"></span>
      </button>

      <!-- Reset -->
      <button
        @click="resetCount()"
        class="flex items-center gap-2 px-4 py-2.5 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg font-medium text-sm transition-all border border-gray-200"
      >
        <i data-lucide="rotate-ccw" class="w-4 h-4"></i>
        <span x-text="t.controls?.reset || 'Sıfırla'"></span>
      </button>

      <!-- Source selector -->
      <div class="ml-auto flex items-center gap-2">
        <label
          class="text-xs text-gray-500"
          x-text="t.controls?.source || 'Kaynak:'"
        ></label>
        <input
          x-model="source"
          type="text"
          placeholder="0 veya video.mp4"
          class="px-3 py-2 border border-gray-200 rounded-lg text-sm w-40 focus:ring-2 focus:ring-primary-300 focus:border-primary-400 outline-none"
        />
      </div>
    </div>
  </div>

  <!-- Main Grid: Camera + Stats -->
  <div class="grid grid-cols-1 xl:grid-cols-3 gap-4 mb-4">
    <!-- Camera Feed -->
    <div
      class="xl:col-span-2 bg-black rounded-xl overflow-hidden shadow-sm border border-gray-200 relative"
    >
      <div class="aspect-video relative">
        <img
          id="camera-feed"
          src="/api/stream"
          class="w-full h-full object-contain bg-gray-900"
          alt="Camera Feed"
          onerror="this.style.opacity = '0.3'"
        />
        <!-- Overlay: Count Display -->
        <div
          class="absolute top-4 right-4 bg-black/60 backdrop-blur-sm rounded-xl px-5 py-3 text-white"
        >
          <div
            class="text-xs uppercase tracking-wider opacity-70 mb-0.5"
            x-text="t.dashboard?.total || 'Toplam Sayım'"
          ></div>
          <div
            class="text-4xl font-bold tabular-nums"
            x-text="status.total_count || 0"
          ></div>
        </div>
        <!-- Status badge -->
        <div class="absolute top-4 left-4">
          <span
            x-show="status.running && !status.paused"
            class="flex items-center gap-1.5 bg-green-500/90 backdrop-blur-sm text-white text-xs px-3 py-1.5 rounded-full font-medium"
          >
            <span
              class="w-1.5 h-1.5 rounded-full bg-white animate-pulse"
            ></span>
            CANLI
          </span>
          <span
            x-show="status.running && status.paused"
            class="flex items-center gap-1.5 bg-yellow-500/90 backdrop-blur-sm text-white text-xs px-3 py-1.5 rounded-full font-medium"
          >
            <i data-lucide="pause" class="w-3 h-3"></i>
            DURAKLATILDI
          </span>
          <span
            x-show="!status.running"
            class="flex items-center gap-1.5 bg-gray-500/90 backdrop-blur-sm text-white text-xs px-3 py-1.5 rounded-full font-medium"
          >
            KAPALI
          </span>
        </div>
        <!-- FPS -->
        <div
          class="absolute bottom-4 left-4 bg-black/50 backdrop-blur-sm text-white text-xs px-2 py-1 rounded-lg font-mono"
          x-show="status.running"
        >
          <span x-text="status.fps + ' FPS'"></span>
          <span
            class="opacity-60 ml-1"
            x-text="'| ' + status.resolution"
          ></span>
        </div>
      </div>
    </div>

    <!-- Right Panel: Quick Stats -->
    <div class="space-y-4">
      <!-- Today's Count -->
      <div
        class="bg-gradient-to-br from-primary-500 to-primary-700 rounded-xl p-5 text-white shadow-md"
      >
        <div class="flex items-center justify-between">
          <div>
            <p
              class="text-primary-100 text-xs font-medium uppercase tracking-wider"
              x-text="t.dashboard?.today || 'Bugün'"
            ></p>
            <p class="text-3xl font-bold mt-1" x-text="todayCount"></p>
          </div>
          <div class="bg-white/20 rounded-xl p-3">
            <i data-lucide="egg" class="w-6 h-6"></i>
          </div>
        </div>
        <!-- Goal progress -->
        <div x-show="dailyGoal > 0" class="mt-3">
          <div class="flex justify-between text-xs text-primary-100 mb-1">
            <span x-text="(t.dashboard?.goal||'Hedef')+': '+dailyGoal"></span>
            <span
              x-text="Math.min(100, Math.round(todayCount/dailyGoal*100))+'%'"
            ></span>
          </div>
          <div class="w-full bg-white/20 rounded-full h-2">
            <div
              class="bg-white rounded-full h-2 transition-all duration-700"
              :style="'width:'+Math.min(100,todayCount/Math.max(1,dailyGoal)*100)+'%'"
            ></div>
          </div>
        </div>
      </div>

      <!-- Active Tracks -->
      <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-200">
        <div class="flex items-center justify-between">
          <div>
            <p
              class="text-gray-500 text-xs font-medium"
              x-text="t.dashboard?.active_tracks || 'Aktif Takip'"
            ></p>
            <p
              class="text-2xl font-bold mt-0.5"
              x-text="status.active_tracks || 0"
            ></p>
          </div>
          <div class="bg-orange-50 rounded-xl p-3">
            <i data-lucide="scan-eye" class="w-5 h-5 text-orange-500"></i>
          </div>
        </div>
      </div>

      <!-- Session Info -->
      <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-200">
        <div class="flex items-center justify-between">
          <div>
            <p
              class="text-gray-500 text-xs font-medium"
              x-text="t.dashboard?.session || 'Oturum Sayımı'"
            ></p>
            <p
              class="text-2xl font-bold mt-0.5"
              x-text="status.total_count || 0"
            ></p>
          </div>
          <div class="bg-green-50 rounded-xl p-3">
            <i data-lucide="hash" class="w-5 h-5 text-green-500"></i>
          </div>
        </div>
      </div>

      <!-- Frame Count -->
      <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-200">
        <div class="flex items-center justify-between">
          <div>
            <p
              class="text-gray-500 text-xs font-medium"
              x-text="t.dashboard?.frames || 'İşlenen Frame'"
            ></p>
            <p
              class="text-2xl font-bold mt-0.5 tabular-nums"
              x-text="(status.frame_count||0).toLocaleString()"
            ></p>
          </div>
          <div class="bg-purple-50 rounded-xl p-3">
            <i data-lucide="film" class="w-5 h-5 text-purple-500"></i>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bottom Row: Recent Events + Mini Chart -->
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
    <!-- Recent Events -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-200">
      <div
        class="flex items-center justify-between px-5 py-3 border-b border-gray-100"
      >
        <h3
          class="font-semibold text-sm text-gray-700"
          x-text="t.dashboard?.recent || 'Son Sayımlar'"
        ></h3>
        <span
          class="text-xs text-gray-400"
          x-text="recentEvents.length+' '+( t.common?.items||'kayıt')"
        ></span>
      </div>
      <div class="overflow-y-auto max-h-64 divide-y divide-gray-50">
        <template x-for="(ev, i) in recentEvents" :key="i">
          <div
            class="flex items-center justify-between px-5 py-2.5 hover:bg-gray-50 transition-colors"
          >
            <div class="flex items-center gap-3">
              <span
                class="w-8 h-8 bg-green-50 text-green-600 rounded-lg flex items-center justify-center text-xs font-bold"
                x-text="'+1'"
              ></span>
              <div>
                <p class="text-sm font-medium text-gray-700">
                  Track #<span x-text="ev.track_id"></span>
                </p>
                <p class="text-xs text-gray-400" x-text="ev.timestamp"></p>
              </div>
            </div>
            <div class="text-right">
              <p
                class="text-sm font-bold text-gray-800"
                x-text="'→ '+(ev.total||'')"
              ></p>
              <p
                class="text-xs text-gray-400"
                x-text="((ev.confidence||0)*100).toFixed(0)+'%'"
              ></p>
            </div>
          </div>
        </template>
        <div
          x-show="recentEvents.length===0"
          class="px-5 py-8 text-center text-gray-400 text-sm"
        >
          <i data-lucide="inbox" class="w-8 h-8 mx-auto mb-2 opacity-30"></i>
          <span x-text="t.dashboard?.no_events || 'Henüz sayım yok'"></span>
        </div>
      </div>
    </div>

    <!-- Mini Hourly Chart -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-5">
      <h3
        class="font-semibold text-sm text-gray-700 mb-3"
        x-text="t.dashboard?.hourly || 'Bugün Saatlik Dağılım'"
      ></h3>
      <div class="h-48">
        <canvas id="hourlyMiniChart"></canvas>
      </div>
    </div>
  </div>
</div>

<script>
  function dashboard() {
    return {
      source: "0",
      todayCount: 0,
      dailyGoal: 0,
      recentEvents: [],
      hourlyChart: null,
      init() {
        this.fetchToday();
        setInterval(() => this.fetchToday(), 5000);
        this.$nextTick(() => this.initHourlyChart());
      },
      async startPipeline() {
        const res = await fetch("/api/pipeline/start", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ source: this.source || undefined }),
        });
        const d = await res.json();
        if (!d.ok) showToast(d.error || "Başlatılamadı", "error");
        else
          showToast(
            this.$root.__x?.$data?.t?.controls?.started ||
              "Pipeline başlatıldı",
            "success",
          );
      },
      async stopPipeline() {
        const res = await fetch("/api/pipeline/stop", { method: "POST" });
        const d = await res.json();
        if (d.ok) showToast("Pipeline durduruldu", "info");
      },
      async pausePipeline() {
        await fetch("/api/pipeline/pause", { method: "POST" });
      },
      async resumePipeline() {
        await fetch("/api/pipeline/resume", { method: "POST" });
      },
      async resetCount() {
        await fetch("/api/pipeline/reset", { method: "POST" });
        showToast("Sayaç sıfırlandı", "info");
      },
      async fetchToday() {
        try {
          const r = await fetch("/api/stats/today");
          const d = await r.json();
          this.todayCount = d.count || 0;
          this.dailyGoal = d.goal || 0;
        } catch (e) {}
      },
      initHourlyChart() {
        const el = document.getElementById("hourlyMiniChart");
        if (!el) return;
        fetch("/api/stats")
          .then((r) => r.json())
          .then((d) => {
            const dist = d.hourly_dist || [];
            const labels = dist.map((x) => x.hour + ":00");
            const data = dist.map((x) => x.count);
            if (this.hourlyChart) this.hourlyChart.destroy();
            this.hourlyChart = new Chart(el, {
              type: "bar",
              data: {
                labels,
                datasets: [
                  {
                    data,
                    backgroundColor: "rgba(59,130,246,0.5)",
                    borderColor: "rgb(59,130,246)",
                    borderWidth: 1,
                    borderRadius: 4,
                  },
                ],
              },
              options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                  x: { grid: { display: false }, ticks: { font: { size: 9 } } },
                  y: {
                    beginAtZero: true,
                    ticks: { precision: 0, font: { size: 10 } },
                  },
                },
              },
            });
          });
      },
    };
  }
</script>
